<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JOBIFY.in | Job Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        header {
            background-color: #1f4ed8;
            color: white;
            text-align: center;
            padding: 25px;
        }

        nav {
            background-color: white;
            padding: 12px;
            text-align: center;
        }

        nav a {
            text-decoration: none;
            color: #1f4ed8;
            margin: 0 15px;
            font-weight: bold;
        }

        section {
            background-color: white;
            margin: 20px;
            padding: 20px;
            border-radius: 6px;
        }

        h2 {
            color: #1f4ed8;
        }

        input {
            padding: 8px;
            width: 250px;
            margin: 6px 0;
        }

        button {
            padding: 8px 16px;
            border: none;
            background-color: green;
            color: white;
            cursor: pointer;
        }

        .job-card {
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 15px;
            background-color: #fafafa;
            transition: 0.3s;
        }

        .job-card:hover {
            background-color: #e8f0ff;
        }

        .delete-btn {
            background-color: red;
            margin-left: 10px;
        }

        footer {
            background-color: #1f4ed8;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1>JOBIFY.in</h1>
    <p>Your trusted job search platform</p>
    <p>Total Jobs Available: <strong><span id="jobCount">0</span></strong></p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Jobs</a>
    <a href="#">Companies</a>
    <a href="#">Post Resume</a>
    <a href="#">Login</a>
</nav>

<section>
    <h2>Add a Job</h2>

    <input type="text" id="jobTitle" placeholder="Job Title"><br>
    <input type="text" id="companyName" placeholder="Company Name"><br>
    <input type="text" id="jobLocation" placeholder="Location"><br>

    <button onclick="addJob()">Add Job</button>
</section>

<section id="jobList">
    <h2>Featured Job Openings</h2>

    
</section>

<footer>
    <p>© 2026 JOBIFY.in</p>
    <p>Email: support@jobify.in</p>
</footer>

<script src="script.js"></script>

</body>
</html>
